name: NEXUS E2E + Coverage Gate

on:
  push:
    branches: [main, master]
    paths:
      - '20_Projects/PJT_CDC_The_Nexus/**'
  pull_request:
    branches: [main, master]
    paths:
      - '20_Projects/PJT_CDC_The_Nexus/**'

defaults:
  run:
    working-directory: 20_Projects/PJT_CDC_The_Nexus

jobs:
  test:
    name: Vitest + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 20_Projects/PJT_CDC_The_Nexus/package-lock.json
      - run: npm ci
      - name: Vitest with coverage
        run: npx vitest run --coverage
      - name: Coverage thresholds
        run: |
          node -e "
            const cov = require('./coverage/coverage-summary.json').total;
            const fail = [];
            if (cov.statements.pct < 90) fail.push('Stmts ' + cov.statements.pct + ' < 90');
            if (cov.functions.pct < 90) fail.push('Funcs ' + cov.functions.pct + ' < 90');
            if (cov.lines.pct < 90) fail.push('Lines ' + cov.lines.pct + ' < 90');
            if (fail.length) { console.error('Coverage gate failed:', fail.join(', ')); process.exit(1); }
            console.log('Coverage gate PASS');
          "

  build:
    name: Vite Build + Bundle Size Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 20_Projects/PJT_CDC_The_Nexus/package-lock.json
      - run: npm ci
      - name: Vite production build
        run: npx vite build
      - name: Bundle size gate (gzip JS ≤ 250 KB)
        run: |
          JS_FILE=$(ls -S dist/assets/index-*.js | head -1)
          JS_GZ_KB=$(($(gzip -c "$JS_FILE" | wc -c) / 1024))
          echo "JS gzip size: ${JS_GZ_KB} KB"
          if [ "$JS_GZ_KB" -gt 250 ]; then
            echo "::error::Bundle size ${JS_GZ_KB}KB exceeds 250 KB limit"
            exit 1
          fi
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-dist
          path: 20_Projects/PJT_CDC_The_Nexus/dist
          retention-days: 1

  e2e:
    name: Playwright E2E (Electron)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 20_Projects/PJT_CDC_The_Nexus/package-lock.json
      - run: npm ci
      - name: Install xvfb (Electron headless on Linux)
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: nexus-dist
          path: 20_Projects/PJT_CDC_The_Nexus/dist
      - name: Run Playwright E2E
        run: xvfb-run --auto-servernum npx playwright test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: 20_Projects/PJT_CDC_The_Nexus/e2e-report
          retention-days: 7

# "시각(時刻)에 존재하고, 시간(時間)에 소멸한다."
# "Exists in the Moment, Vanishes in Time."
