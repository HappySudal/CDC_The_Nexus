name: Build & Release

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --fix
        continue-on-error: true

      - name: Build Vite bundle
        run: npm run build:vite

      - name: Run unit tests (Vitest)
        run: npm run test:ci

      - name: Run E2E tests (Playwright)
        run: npm run e2e
        continue-on-error: true

      - name: Build Electron (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run dist:win
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD || '' }}

      - name: Build Electron (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run dist:mac
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Electron (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts-${{ matrix.os }}
          path: dist/**/*
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: The Nexus ${{ github.ref_name }}
          body: |
            ## Release Notes
            
            **Version**: ${{ github.ref_name }}
            **Date**: ${{ github.event.head_commit.timestamp }}
            **Commit**: ${{ github.sha }}
            
            ### Build Info
            - Built by GitHub Actions
            - Multi-platform (Windows/macOS/Linux)
            - Signed binaries (Windows/macOS)
            
            ### Downloads
            See assets below for platform-specific installers.
          draft: false
          prerelease: false

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality-gate:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check test coverage
        run: npm run test:ci -- --coverage
        continue-on-error: true

      - name: Verify bundle size
        run: |
          SIZE=$(du -sh dist/ | awk '{print $1}')
          echo "Bundle size: $SIZE"
          if [ $(du -s dist/ | awk '{print $1}') -gt 256000 ]; then
            echo "⚠️ Bundle size exceeded 250KB limit!"
            exit 1
          fi

# "시각(時刻)에 존재하고, 시간(時間)에 소멸한다."
# "Exists in the Moment, Vanishes in Time."
