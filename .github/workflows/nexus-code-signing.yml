name: Nexus Code Signing (D2.4)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  code-signing:
    runs-on: windows-latest
    if: github.ref_type == 'tag'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import code signing certificate
        run: |
          # Certificate from secrets
          $cert = [System.Convert]::FromBase64String("${{ secrets.CODE_SIGNING_CERT_BASE64 }}")
          $certPath = "C:\signing.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $cert)
          Write-Host "Certificate imported: $certPath"
        shell: powershell

      - name: Build Vite frontend
        run: npm run build:vite

      - name: Build and sign Electron app
        run: npm run build:electron -- --win
        env:
          WIN_SIGNING_CERT_PATH: C:\signing.pfx
          WIN_SIGNING_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CERT_PASSWORD }}
          WIN_SIGNING_HASH_ALGORITHMS: sha256

      - name: Verify signatures
        run: |
          # Verify that .exe files are signed
          $files = Get-ChildItem "dist-electron\*.exe" -Recurse
          foreach ($file in $files) {
            $sig = Get-AuthenticodeSignature $file.FullName
            if ($sig.Status -eq "Valid") {
              Write-Host "✓ $($file.Name) is properly signed"
            } else {
              Write-Host "✗ $($file.Name) is NOT signed or signature is invalid"
              exit 1
            }
          }
        shell: powershell

      - name: Clean up certificate
        if: always()
        run: |
          Remove-Item "C:\signing.pfx" -Force -ErrorAction SilentlyContinue
        shell: powershell

      - name: Upload signed binaries
        uses: actions/upload-artifact@v4
        with:
          name: nexus-signed-binaries
          path: |
            dist-electron/*.exe
            dist-electron/*.nsis
          retention-days: 60

  publish-release:
    runs-on: ubuntu-latest
    needs: code-signing
    if: github.ref_type == 'tag'

    steps:
      - uses: actions/checkout@v4

      - name: Download signed binaries
        uses: actions/download-artifact@v4
        with:
          name: nexus-signed-binaries
          path: ./binaries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: binaries/**/*.exe
          body: |
            # The Nexus Release ${{ github.ref_name }}

            ## What's New
            See [CHANGELOG.md](CHANGELOG.md) for detailed changes.

            ## Installation
            - **Windows Installer**: The_Nexus-${{ github.ref_name }}-x64.exe
            - **Portable**: The_Nexus-${{ github.ref_name }}-portable.exe

            ## Code Signing
            ✅ All binaries are digitally signed and verified.
            - Signature Algorithm: SHA-256
            - Timestamp Authority: Enabled
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# "시각(時刻)에 존재하고, 시간(時間)에 소멸한다."
# "Exists in the Moment, Vanishes in Time."
